<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Древнетюркские руны</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(to right, #000000, #000066);
        }

        h1 {
            font-family: "Brush Script MT", cursive;
            font-size: 32px;
            color: #ffffff;
            text-align: center;
        }

        h3 {
            font-family: "Brush Script MT", cursive;
            font-size: 18px;
            color: #ffffff;
        }

        #inputField {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #outputField {
            width: 100%;
            padding: 10px;
            font-size: 24px;
            min-height: 100px;
            direction: rtl;
            background: white;
            border: 1px solid #ccc;
        }
        .buttons {
            margin-top: 20px;
        }
        .buttons button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <style>
        .container {
            display: inline-block;
            background-color: #333;
            padding: 10px;
            border-radius: 10px;
        }

        .row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            justify-content: center;
        }

        .row button {
            width: 40px;
            height: 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background: linear-gradient(to left, #ffcc00, #ff9900);
            color: #333;
            cursor: pointer;
            transition: background 0.2s;
        }

        .row button:hover {
            background: #fff;
        }

        .row button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<h1>Конвертер в древнетюркские руны</h1>
<style>
    body {color: #ffffff;}
</style>

<div style="margin-bottom: 15px;">
    <label style="font-family: 'Brush Script MT', cursive;">
        <input type="radio" name="mode" value="simple" checked onchange="RunesConverter.switchMode()">
        Простой режим
    </label>
    <label style="font-family: 'Brush Script MT', cursive;">
        <input type="radio" name="mode" value="smart" onchange="RunesConverter.switchMode()" >
        Исторический режим
    </label>
</div>

<h3>Введите текст (русскими буквами):</h3>

<input type="text" id="inputField" placeholder="Напишите что-нибудь...">
<style>

    #inputField {
        color: white;
    }
    #inputField::placeholder {
        color: rgba(255, 255, 255, 0.7);
    }
</style>

<style>
    #inputField { border-radius: 8px; padding: 10px; border: none; width: 100%; box-sizing: border-box;
        background:  linear-gradient(to right, #990099, #9900cc);}
    #outputField { border-radius: 8px; padding: 10px; border: none; min-height: 60px; background: linear-gradient(to right, #990099, #9900cc); }
</style>

<div class="container">
    <style> </style>
    <div class="row one">
        <button>Й</button>
        <button>Ц</button>
        <button>У</button>
        <button>К</button>
        <button>Е</button>
        <button>Н</button>
        <button>Г</button>
        <button>Ш</button>
        <button>Щ</button>
        <button>З</button>
        <button>Х</button>
        <button>Ъ</button>
    </div>

    <div class="row two">
        <button>Ф</button>
        <button>Ы</button>
        <button>В</button>
        <button>А</button>
        <button>П</button>
        <button>Р</button>
        <button>О</button>
        <button>Л</button>
        <button>Д</button>
        <button>Ж</button>
        <button>Э</button>
    </div>

    <div class="row three">
        <button>Я</button>
        <button>Ч</button>
        <button>С</button>
        <button>М</button>
        <button>И</button>
        <button>Т</button>
        <button>Ь</button>
        <button>Б</button>
        <button>Ю</button>
    </div>
</div>



<h3>Рунический текст:</h3>
<div id="outputField"></div>

<div class="buttons">
    <button onclick="RunesConverter.addSpace()">Пробел</button>
    <button onclick="RunesConverter.backspace()">Назад</button>
    <button onclick="RunesConverter.clearAll()">Очистить</button>
    <button onclick="RunesConverter.copyToClipboard()">Копировать</button>
</div>

<style>
    .buttons button {
        border-radius: 8px;
        padding: 10px 15px;
        border: none;
        background: linear-gradient(to left, #ffcc00, #ff9900);
        color: #333;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: bold;
    }

    .buttons button:hover {
        background: #ffffff;
        color: #000;
        box-shadow: 0 4px 8px rgba(255, 255, 255, 0.3);
    }

    .buttons button:active {
        background: #f0f0f0;
        transform: scale(0.98);
    }

</style>



<script>
    const keyboardButtons = document.querySelectorAll('.row button');
    const inputField = document.getElementById('inputField');

    keyboardButtons.forEach(button => {
        button.addEventListener('click', function() {
            const letter = this.textContent;
            inputField.value += letter;

            RunesConverter.handleInput();

            inputField.focus();
        });
    });

    inputField.addEventListener('input', () => {
        RunesConverter.handleInput();
    });
</script>

<script>
    const RunesConverter = (() => {
        const MAPPING = {
            'а': '\u{10C00}', 'е': '\u{10C01}', 'и': '\u{10C02}', 'ы': '\u{10C03}',
            'о': '\u{10C04}', 'ө': '\u{10C05}', 'у': '\u{10C06}', 'ү': '\u{10C07}',
            'б': '\u{10C0A}', 'в': '\u{10C0B}', 'г': '\u{10C0C}', 'д': '\u{10C0D}',
            'ж': '\u{10C0E}', 'з': '\u{10C0F}', 'й': '\u{10C10}', 'к': '\u{10C11}',
            'л': '\u{10C12}', 'м': '\u{10C13}', 'н': '\u{10C14}', 'ң': '\u{10C15}',
            'п': '\u{10C16}', 'р': '\u{10C17}', 'с': '\u{10C18}', 'т': '\u{10C19}',
            'ф': '\u{10C1A}', 'х': '\u{10C1B}', 'ц': '\u{10C1C}',
            'э': '\u{10C20}', 'ю': '\u{10C21}', 'я': '\u{10C22}',
            'ч': '\u{10C23}', 'ш': '\u{10C24}', 'щ': '\u{10C25}'
        };

        const REVERSE_MAPPING = Object.entries(MAPPING).reduce((acc, [rus, rune]) => {
            acc[rune] = rus;
            return acc;
        }, {});

        let currentMode = 'simple';
        let inputElement = null;
        let outputElement = null;

        function containsRunes(text) {
            for (let char of text) {
                const code = char.codePointAt(0);
                if (code >= 0x10C00 && code <= 0x10C4F) return true;
            }
            return false;
        }

        function convertToRunes(text) {
            return text.toLowerCase().split('').map(char => MAPPING[char] || char).join('');
        }

        function convertToCyrillic(text) {
            return Array.from(text).map(char => REVERSE_MAPPING[char] || char).join('');
        }

        function convert(text) {
            if (!text) return '';
            
            if (currentMode === 'smart') {
                return convertToRunes(text);
            }
            
            if (containsRunes(text)) {
                return convertToCyrillic(text);
            } else {
                return convertToRunes(text);
            }
        }

        function handleInput() {
            if (!inputElement || !outputElement) return;
            const text = inputElement.value;
            const hasRunes = containsRunes(text);
            
            const isReverse = (currentMode === 'simple' && hasRunes);
            outputElement.style.direction = isReverse ? 'ltr' : 'rtl';
            outputElement.style.textAlign = isReverse ? 'left' : 'right';
            
            outputElement.textContent = convert(text);
        }

        function switchMode() {
            const checked = document.querySelector('input[name="mode"]:checked');
            if (checked) currentMode = checked.value;
            handleInput();
        }

        function addSpace() {
            if (!inputElement) return;
            inputElement.value += ' ';
            handleInput();
            inputElement.focus();
        }

        function backspace() {
            if (!inputElement) return;
            inputElement.value = inputElement.value.slice(0, -1);
            handleInput();
            inputElement.focus();
        }

        function clearAll() {
            if (!inputElement || !outputElement) return;
            inputElement.value = '';
            outputElement.textContent = '';
            inputElement.focus();
        }

        async function copyToClipboard() {
            if (!outputElement) return;
            try {
                await navigator.clipboard.writeText(outputElement.textContent);
                alert('Скопировано!');
            } catch {
                const ta = document.createElement('textarea');
                ta.value = outputElement.textContent;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('Скопировано!');
            }
        }

        function validate() {
            const tests = [
                { input: 'аба', expected: '\u{10C00}\u{10C0A}\u{10C00}' },
                { input: 'тюрк', expected: '\u{10C19}\u{10C21}\u{10C17}\u{10C11}' },
                { input: 'каган', expected: '\u{10C11}\u{10C00}\u{10C0C}\u{10C00}\u{10C14}' },
                { input: 'билге', expected: '\u{10C0A}\u{10C02}\u{10C12}\u{10C0C}\u{10C01}' },
                { input: 'Hello!', expected: 'hello!' },
                { input: '', expected: '' },
                { input: '\u{10C19}\u{10C21}\u{10C17}\u{10C11}', expected: 'тюрк', desc: 'Обратная конверсия' }
            ];

            console.group('Автопроверки');
            let passed = 0;
            tests.forEach((t, i) => {
                const result = convert(t.input);
                const ok = result === t.expected;
                if (ok) {
                    passed++;
                    console.log(`Тест ${i+1}: "${t.input}" → OK ${t.desc || ''}`);
                } else {
                    console.error(`Тест ${i+1} FAILED: "${t.input}"`);
                    console.error(`   Ожидается: ${t.expected}`);
                    console.error(`   Получено: ${result}`);
                }
            });
            console.log(`\nПройдено: ${passed}/${tests.length}`);
            console.groupEnd();
        }

        function init() {
            inputElement = document.getElementById('inputField');
            outputElement = document.getElementById('outputField');

            if (!inputElement || !outputElement) {
                console.error('Элементы не найдены');
                return;
            }

            inputElement.addEventListener('input', handleInput);
            console.log('Конвертер загружен');
            validate();
        }

        return { init, switchMode, addSpace, backspace, clearAll, copyToClipboard };
    })();

    document.addEventListener('DOMContentLoaded', RunesConverter.init);
    window.RunesConverter = RunesConverter;
</script>

<footer style="text-align: center; margin-top: 50px; font-size: 14px; color: #fff; opacity: 0.7;">
    Реализовано при поддержке команды "Баги по колено"
</footer>

</body>
</html>
