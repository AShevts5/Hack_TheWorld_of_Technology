
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Древнетюркские руны</title>
    <style>
        :root {
            --bg-body: linear-gradient(to right, #000000, #000066);
            --text-color: #ffffff;
            --heading-font: "Brush Script MT", cursive;

            --input-bg: linear-gradient(to right, #990099, #9900cc);
            --input-text: #ffffff;
            --placeholder-color: rgba(255, 255, 255, 0.7);

            --output-bg: #1a1a1a;
            --output-text: #ffffff;
            --output-border: 1px solid #444;

            --keyboard-bg: #333;
            --key-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --key-text: #333;
            --key-hover: #fff;

            --btn-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --btn-text: #333;
            --btn-hover-bg: #ffffff;
            --btn-hover-text: #000;

            --footer-color: rgba(255, 255, 255, 0.7);
        }

        body.light-theme {
            --bg-body: #f0f2f5;
            --text-color: #333333;

            --input-bg: linear-gradient(to right, #d080d0, #c080c0);
            --input-text: #ffffff;
            --placeholder-color: rgba(255, 255, 255, 0.8);

            --output-bg: #ffffff;
            --output-text: #000000;
            --output-border: 1px solid #ccc;

            --keyboard-bg: #e0e0e0;
            --key-bg: linear-gradient(to left, #ffd700, #ffa500);
            --key-text: #000;
            --key-hover: #fff;

            --btn-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --btn-text: #000;
            --btn-hover-bg: #333;
            --btn-hover-text: #fff;

            --footer-color: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: var(--bg-body);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }

        h1, h3 {
            font-family: var(--heading-font);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: var(--text-color);
        }

        h3 {
            font-size: 18px;
            color: var(--text-color);
        }

        #inputField {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border-radius: 8px;
            border: none;
            background: var(--input-bg);
            color: var(--input-text);
        }

        #inputField::placeholder {
            color: var(--placeholder-color);
        }

        #outputField {
            width: 100%;
            padding: 10px;
            font-size: 24px;
            min-height: 100px;
            direction: rtl;
            background: linear-gradient(to right, #990099, #9900cc);
            color: var(--output-text);
            border: var(--output-border);
            border-radius: 8px;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }

        .container {
            display: inline-block;
            background-color: var(--keyboard-bg);
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
            display: block;
            width: fit-content;
            transition: background 0.3s;
        }

        .row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            justify-content: center;
        }

        .row button {
            width: 40px;
            height: 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background: var(--key-bg);
            color: var(--key-text);
            cursor: pointer;
            transition: background 0.2s;
        }

        .row button:hover {
            background: var(--key-hover);
        }

        .row button:active {
            transform: scale(0.95);
        }

        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        .buttons button {
            border-radius: 8px;
            padding: 10px 15px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            margin: 5px;
        }

        .buttons button:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .buttons button:active {
            transform: scale(0.98);
        }

        .theme-switcher {
            text-align: center;
            margin-bottom: 20px;
        }

        .theme-switcher label {
            margin: 0 10px;
            cursor: pointer;
            font-family: var(--heading-font);
            font-size: 18px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            color: var(--footer-color);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="theme-switcher">
    <label>
        <input type="radio" name="theme" value="dark" checked onchange="setTheme('dark')">
        Тёмная тема
    </label>
    <label>
        <input type="radio" name="theme" value="light" onchange="setTheme('light')">
        Светлая тема
    </label>
</div>

<h1>Конвертер в древнетюркские руны</h1>

<div style="margin-bottom: 15px; text-align: center;">
    <label style="font-family: 'Brush Script MT', cursive; font-size: 18px;">
        <input type="radio" name="mode" value="simple" checked onchange="RunesConverter.switchMode()">
        Простой режим
    </label>
    <label style="font-family: 'Brush Script MT', cursive; font-size: 18px; margin-left: 20px;">
        <input type="radio" name="mode" value="smart" onchange="RunesConverter.switchMode()" >
        Исторический режим
    </label>
</div>

<h3>Введите текст (русскими буквами):</h3>
<input type="text" id="inputField" placeholder="Напишите что-нибудь...">

<div class="container">
    <div class="row one">
        <button>Й</button>
        <button>Ц</button>
        <button>У</button>
        <button>К</button>
        <button>Е</button>
        <button>Н</button>
        <button>Г</button>
        <button>Ш</button>
        <button>Щ</button>
        <button>З</button>
        <button>Х</button>
        <button>Ъ</button>
    </div>
    <div class="row two">
        <button>Ф</button>
        <button>Ы</button>
        <button>В</button>
        <button>А</button>
        <button>П</button>
        <button>Р</button>
        <button>О</button>
        <button>Л</button>
        <button>Д</button>
        <button>Ж</button>
        <button>Э</button>
    </div>
    <div class="row three">
        <button>Я</button>
        <button>Ч</button>
        <button>С</button>
        <button>М</button>
        <button>И</button>
        <button>Т</button>
        <button>Ь</button>
        <button>Б</button>
        <button>Ю</button>
    </div>
</div>

<h3>Рунический текст:</h3>
<div id="outputField"></div>

<div class="buttons">
    <button onclick="RunesConverter.addSpace()">Пробел</button>
    <button onclick="RunesConverter.backspace()">Назад</button>
    <button onclick="RunesConverter.clearAll()">Очистить</button>
    <button onclick="RunesConverter.copyToClipboard()">Копировать</button>
</div>

<footer>
    Реализовано при поддержке команды "Баги по колено"
</footer>

<script>
    function setTheme(themeName) {
        if (themeName === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        localStorage.setItem('theme', themeName);

        const radio = document.querySelector(`input[name="theme"][value="${themeName}"]`);
        if (radio) radio.checked = true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark'; // По умолчанию тёмная
        setTheme(savedTheme);
    });
</script>

<script>
    const keyboardButtons = document.querySelectorAll('.row button');
    const inputField = document.getElementById('inputField');

    keyboardButtons.forEach(button => {
        button.addEventListener('click', function() {
            const letter = this.textContent;
            inputField.value += letter;
            RunesConverter.handleInput();
            inputField.focus();
        });
    });

    inputField.addEventListener('input', () => {
        RunesConverter.handleInput();
    });
</script>

<script>
    const RunesConverter = (() => {
        const MAPPING = {
            'а': '\u{10C00}', 'е': '\u{10C01}', 'и': '\u{10C02}', 'ы': '\u{10C03}',
            'о': '\u{10C04}', 'ө': '\u{10C05}', 'у': '\u{10C06}', 'ү': '\u{10C07}',
            'э': '\u{10C1D}', 'ю': '\u{10C1E}', 'я': '\u{10C1F}',
            'б': '\u{10C0A}', 'в': '\u{10C0B}', 'г': '\u{10C0C}', 'д': '\u{10C0D}',
            'ж': '\u{10C0E}', 'з': '\u{10C0F}', 'й': '\u{10C10}', 'к': '\u{10C11}',
            'л': '\u{10C12}', 'м': '\u{10C13}', 'н': '\u{10C14}', 'ң': '\u{10C15}',
            'п': '\u{10C16}', 'р': '\u{10C17}', 'с': '\u{10C18}', 'т': '\u{10C19}',
            'ф': '\u{10C1A}', 'х': '\u{10C1B}', 'ц': '\u{10C1C}', 'ч': '\u{10C1D}',
            'ш': '\u{10C1E}', 'щ': '\u{10C1F}',
        };

        let currentMode = 'simple';
        let inputElement = null;
        let outputElement = null;

        function convertSimple(text) {
            if (!text) return '';
            return text.toLowerCase().split('').map(char => MAPPING[char] || char).join('');
        }

        function convert(text) {
            return currentMode === 'smart' ? convertSimple(text) : convertSimple(text);
        }

        function switchMode() {
            const radios = document.getElementsByName('mode');
            for (let radio of radios) {
                if (radio.checked) {
                    currentMode = radio.value;
                    break;
                }
            }
            handleInput();
        }

        function handleInput() {
            if (!inputElement || !outputElement) return;
            const text = inputElement.value;
            const runes = convert(text);
            outputElement.textContent = runes;
        }

        function addSpace() {
            if (!inputElement) return;
            inputElement.value += ' ';
            handleInput();
            inputElement.focus();
        }

        function backspace() {
            if (!inputElement) return;
            inputElement.value = inputElement.value.slice(0, -1);
            handleInput();
            inputElement.focus();
        }

        function clearAll() {
            if (!inputElement || !outputElement) return;
            inputElement.value = '';
            outputElement.textContent = '';
            inputElement.focus();
        }

        async function copyToClipboard() {
            if (!outputElement) return;
            try {
                await navigator.clipboard.writeText(outputElement.textContent);
                alert('Скопировано!');
            } catch (err) {
                alert('Ошибка копирования');
            }
        }

        function init() {
            inputElement = document.getElementById('inputField');
            outputElement = document.getElementById('outputField');
            inputElement.addEventListener('input', handleInput);
        }

        return {
            switchMode,
            handleInput,
            addSpace,
            backspace,
            clearAll,
            copyToClipboard,
            init
        };
    })();

    document.addEventListener('DOMContentLoaded', RunesConverter.init);
</script>

</body>
</html>
