<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Древнетюркские руны - Двунаправленный конвертер</title>
    <style>
        :root {
            --bg-body: linear-gradient(to right, #000000, #000066);
            --text-color: #ffffff;
            --heading-font: "Brush Script MT", cursive;

            --input-bg: linear-gradient(to right, #990099, #9900cc);
            --input-text: #ffffff;
            --placeholder-color: rgba(255, 255, 255, 0.7);

            --output-bg: #1a1a1a;
            --output-text: #ffffff;
            --output-border: 1px solid #444;

            --keyboard-bg: #333;
            --key-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --key-text: #333;
            --key-hover: #fff;

            --btn-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --btn-text: #333;
            --btn-hover-bg: #ffffff;
            --btn-hover-text: #000;

            --footer-color: rgba(255, 255, 255, 0.7);
        }

        body.light-theme {
            --bg-body: #f0f2f5;
            --text-color: #333333;

            --input-bg: linear-gradient(to right, #d080d0, #c080c0);
            --input-text: #ffffff;
            --placeholder-color: rgba(255, 255, 255, 0.8);

            --output-bg: #ffffff;
            --output-text: #000000;
            --output-border: 1px solid #ccc;

            --keyboard-bg: #e0e0e0;
            --key-bg: linear-gradient(to left, #ffd700, #ffa500);
            --key-text: #000;
            --key-hover: #fff;

            --btn-bg: linear-gradient(to left, #ffcc00, #ff9900);
            --btn-text: #000;
            --btn-hover-bg: #333;
            --btn-hover-text: #fff;

            --footer-color: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: var(--bg-body);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }

        h1, h3 {
            font-family: var(--heading-font);
            text-align: center;
        }

        h1 { font-size: 32px; color: var(--text-color); }
        h3 { font-size: 18px; color: var(--text-color); }

        #inputField {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border-radius: 8px;
            border: none;
            background: var(--input-bg);
            color: var(--input-text);
        }

        #inputField::placeholder { color: var(--placeholder-color); }

        #outputField {
            width: 100%;
            padding: 10px;
            font-size: 24px;
            min-height: 100px;
            direction: rtl;
            background: linear-gradient(to right, #990099, #9900cc);
            color: var(--output-text);
            border: var(--output-border);
            border-radius: 8px;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }

        .container {
            display: inline-block;
            background-color: var(--keyboard-bg);
            padding: 10px;
            border-radius: 10px;
            margin: 0 auto;
            display: block;
            width: fit-content;
            transition: background 0.3s;
        }

        .row {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
            justify-content: center;
        }

        .row button {
            width: 40px;
            height: 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background: var(--key-bg);
            color: var(--key-text);
            cursor: pointer;
            transition: background 0.2s;
        }

        .row button:hover { background: var(--key-hover); }
        .row button:active { transform: scale(0.95); }

        .buttons { margin-top: 20px; text-align: center; }

        .buttons button {
            border-radius: 8px;
            padding: 10px 15px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            margin: 5px;
        }

        .buttons button:hover {
            background: var(--btn-hover-bg);
            color: var(--btn-hover-text);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .buttons button:active { transform: scale(0.98); }

        .theme-switcher, .direction-switcher, .mode-switcher {
            text-align: center;
            margin-bottom: 20px;
        }

        .theme-switcher label, .direction-switcher label, .mode-switcher label {
            margin: 0 10px;
            cursor: pointer;
            font-family: var(--heading-font);
            font-size: 18px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 14px;
            color: var(--footer-color);
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="theme-switcher">
    <label>
        <input type="radio" name="theme" value="dark" checked onchange="setTheme('dark')">
        Тёмная тема
    </label>
    <label>
        <input type="radio" name="theme" value="light" onchange="setTheme('light')">
        Светлая тема
    </label>
</div>

<h1>Конвертер в древнетюркские руны</h1>

<div class="direction-switcher">
    <label>
        <input type="radio" name="direction" value="toRunes" checked onchange="changeDirection('toRunes')">
        Русский ➔ Руны
    </label>
    <label>
        <input type="radio" name="direction" value="toCyrillic" onchange="changeDirection('toCyrillic')">
        Руны ➔ Русский
    </label>
</div>

<div class="mode-switcher">
    <label style="font-family: 'Brush Script MT', cursive; font-size: 18px;">
        <input type="radio" name="mode" value="simple" checked onchange="RunesConverter.switchMode()">
        Простой режим
    </label>
    <label style="font-family: 'Brush Script MT', cursive; font-size: 18px; margin-left: 20px;">
        <input type="radio" name="mode" value="smart" onchange="RunesConverter.switchMode()" >
        Исторический режим
    </label>
</div>

<h3 id="inputLabel">Введите текст (русскими буквами):</h3>
<input type="text" id="inputField" placeholder="Напишите что-нибудь...">

<div id="keyboardCyrillic" class="container">
    <div class="row one">
        <button>Й</button>
        <button>Ц</button>
        <button>У</button>
        <button>К</button>
        <button>Е</button>
        <button>Н</button>
        <button>Г</button>
        <button>Ш</button>
        <button>Щ</button>
        <button>З</button>
        <button>Х</button>
        <button>Ъ</button>
    </div>
    <div class="row two">
        <button>Ф</button>
        <button>Ы</button>
        <button>В</button>
        <button>А</button>
        <button>П</button>
        <button>Р</button>
        <button>О</button>
        <button>Л</button>
        <button>Д</button>
        <button>Ж</button>
        <button>Э</button>
    </div>
    <div class="row three">
        <button>Я</button>
        <button>Ч</button>
        <button>С</button>
        <button>М</button>
        <button>И</button>
        <button>Т</button>
        <button>Ь</button>
        <button>Б</button>
        <button>Ю</button>
    </div>
</div>

<div id="keyboardRunes" class="container hidden">
    <div class="row one">
        <button data-rune="&#x10C10;">𐰑</button>
        <button data-rune="&#x10C1C;">𐰜</button>
        <button data-rune="&#x10C06;">𐰆</button>
        <button data-rune="&#x10C11;">𐰑</button>
        <button data-rune="&#x10C01;">𐰁</button>
        <button data-rune="&#x10C14;">𐰔</button>
        <button data-rune="&#x10C0C;">𐰌</button>
        <button data-rune="&#x10C1E;">𐰞</button>
        <button data-rune="&#x10C1F;">𐰟</button>
        <button data-rune="&#x10C0F;"></button>
        <button data-rune="&#x10C1B;"></button>
        <button data-rune="&#x10C00;"></button>
    </div>
    <div class="row two">
        <button data-rune="&#x10C1A;">𐰚</button>
        <button data-rune="&#x10C03;">𐰃</button>
        <button data-rune="&#x10C0B;">𐰋</button>
        <button data-rune="&#x10C00;">𐰀</button>
        <button data-rune="&#x10C16;">𐰖</button>
        <button data-rune="&#x10C17;">𐰗</button>
        <button data-rune="&#x10C04;">𐰄</button>
        <button data-rune="&#x10C12;">𐰒</button>
        <button data-rune="&#x10C0D;"></button>
        <button data-rune="&#x10C0E;">𐰎</button>
        <button data-rune="&#x10C1D;">𐰝</button>
    </div>
    <div class="row three">
        <button data-rune="&#x10C1F;">𐰟</button>
        <button data-rune="&#x10C1D;">𐰝</button>
        <button data-rune="&#x10C18;">𐰘</button>
        <button data-rune="&#x10C13;">𐰓</button>
        <button data-rune="&#x10C02;">𐰂</button>
        <button data-rune="&#x10C19;">𐰙</button>
        <button data-rune="&#x10C00;"></button>
        <button data-rune="&#x10C0A;">𐰊</button>
        <button data-rune="&#x10C1E;">𐰞</button>
    </div>
</div>

<h3 id="outputLabel">Рунический текст:</h3>
<div id="outputField"></div>

<div class="buttons">
    <button onclick="RunesConverter.addSpace()">Пробел</button>
    <button onclick="RunesConverter.backspace()">Назад</button>
    <button onclick="RunesConverter.clearAll()">Очистить</button>
    <button onclick="RunesConverter.copyToClipboard()">Копировать</button>
</div>

<footer>
    Реализовано при поддержке команды "Баги по колено"
</footer>

<script>
    function setTheme(themeName) {
        if (themeName === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        localStorage.setItem('theme', themeName);
        const radio = document.querySelector(`input[name="theme"][value="${themeName}"]`);
        if (radio) radio.checked = true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
    });
</script>

<script>
    let currentDirection = 'toRunes';

    function changeDirection(direction) {
        currentDirection = direction;

        const keyboardCyrillic = document.getElementById('keyboardCyrillic');
        const keyboardRunes = document.getElementById('keyboardRunes');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const inputField = document.getElementById('inputField');

        if (direction === 'toRunes') {
            keyboardCyrillic.classList.remove('hidden');
            keyboardRunes.classList.add('hidden');
            inputLabel.textContent = "Введите текст (русскими буквами):";
            outputLabel.textContent = "Рунический текст:";
            inputField.placeholder = "Напишите что-нибудь на русском...";
        } else {
            keyboardCyrillic.classList.add('hidden');
            keyboardRunes.classList.remove('hidden');
            inputLabel.textContent = "Введите текст (рунами):";
            outputLabel.textContent = "Перевод на русский:";
            inputField.placeholder = "Нажмите на руны...";
        }

        RunesConverter.clearAll();
    }
</script>

<script>
    const inputField = document.getElementById('inputField');

    const cyrillicButtons = document.querySelectorAll('#keyboardCyrillic .row button');
    cyrillicButtons.forEach(button => {
        button.addEventListener('click', function() {
            if (currentDirection !== 'toRunes') return;
            const letter = this.textContent;
            inputField.value += letter;
            RunesConverter.handleInput();
            inputField.focus();
        });
    });

    const runeButtons = document.querySelectorAll('#keyboardRunes .row button');
    runeButtons.forEach(button => {
        button.addEventListener('click', function() {
            if (currentDirection !== 'toCyrillic') return;

            const rune = this.getAttribute('data-rune') || this.textContent;

            inputField.value += rune;
            RunesConverter.handleInput();
            inputField.focus();
        });
    });

    inputField.addEventListener('input', () => {
        RunesConverter.handleInput();
    });
</script>

<script>
    const RunesConverter = (() => {
        const CYR_TO_RUNE = {
            'а': '\u{10C00}', 'е': '\u{10C01}', 'и': '\u{10C02}', 'ы': '\u{10C03}',
            'о': '\u{10C04}', 'ө': '\u{10C05}', 'у': '\u{10C06}', 'ү': '\u{10C07}',
            'э': '\u{10C1D}', 'ю': '\u{10C1E}', 'я': '\u{10C1F}',
            'б': '\u{10C0A}', 'в': '\u{10C0B}', 'г': '\u{10C0C}', 'д': '\u{10C0D}',
            'ж': '\u{10C0E}', 'з': '\u{10C0F}', 'й': '\u{10C10}', 'к': '\u{10C11}',
            'л': '\u{10C12}', 'м': '\u{10C13}', 'н': '\u{10C14}', 'ң': '\u{10C15}',
            'п': '\u{10C16}', 'р': '\u{10C17}', 'с': '\u{10C18}', 'т': '\u{10C19}',
            'ф': '\u{10C1A}', 'х': '\u{10C1B}', 'ц': '\u{10C1C}', 'ч': '\u{10C1D}',
            'ш': '\u{10C1E}', 'щ': '\u{10C1F}',
            ' ': ' '
        };

        const RUNE_TO_CYR = {};
        for (let char in CYR_TO_RUNE) {
            let rune = CYR_TO_RUNE[char];
            if (rune !== ' ') {
                RUNE_TO_CYR[rune] = char;
            }
        }
        RUNE_TO_CYR[' '] = ' ';

        let currentMode = 'simple';
        let inputElement = null;
        let outputElement = null;

        function convertToRunes(text) {
            if (!text) return '';
            return text.toLowerCase().split('').map(char => CYR_TO_RUNE[char] || char).join('');
        }

        function convertToCyrillic(text) {
            if (!text) return '';
            return Array.from(text).map(char => RUNE_TO_CYR[char] || char).join('');
        }

        function handleInput() {
            if (!inputElement || !outputElement) return;

            const text = inputElement.value;
            let result = '';

            if (currentDirection === 'toRunes') {
                result = convertToRunes(text);
                outputElement.style.direction = 'rtl';
                outputElement.style.textAlign = 'right';
            } else {
                result = convertToCyrillic(text);
                outputElement.style.direction = 'ltr';
                outputElement.style.textAlign = 'left';
            }

            outputElement.textContent = result;
        }

        function switchMode() {
            const checked = document.querySelector('input[name="mode"]:checked');
            if (checked) currentMode = checked.value;
            handleInput();
        }

        function addSpace() {
            if (!inputElement) return;
            inputElement.value += ' ';
            handleInput();
            inputElement.focus();
        }

        function backspace() {
            if (!inputElement) return;
            inputElement.value = inputElement.value.slice(0, -1);
            handleInput();
            inputElement.focus();
        }

        function clearAll() {
            if (!inputElement || !outputElement) return;
            inputElement.value = '';
            outputElement.textContent = '';
            inputElement.focus();
        }

        async function copyToClipboard() {
            if (!outputElement) return;
            try {
                await navigator.clipboard.writeText(outputElement.textContent);
                alert('Скопировано!');
            } catch {
                const ta = document.createElement('textarea');
                ta.value = outputElement.textContent;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('Скопировано!');
            }
        }

        function init() {
            inputElement = document.getElementById('inputField');
            outputElement = document.getElementById('outputField');
            if (!inputElement || !outputElement) return;

            handleInput();
        }

        return {
            switchMode,
            handleInput,
            addSpace,
            backspace,
            clearAll,
            copyToClipboard,
            init
        };
    })();

    document.addEventListener('DOMContentLoaded', RunesConverter.init);
</script>

</body>
</html>
